<div class="tl-widget">
    {% for group, options, index in widget.optgroups %}
    {% for option in options %}
    <label class="tl-opt {% if option.attrs.checked %}tl-active{% endif %}" data-val="{{ option.value }}">
        <input type="{{ option.type }}" 
               name="{{ option.name }}" 
               value="{{ option.value }}"
               {% if option.attrs.checked %}checked{% endif %}
               {% include "django/forms/widgets/attrs.html" with widget=option %}>
        <span class="tl-icon">
            {% if option.value == 'ready_to_start' %}🔧{% endif %}
            {% if option.value == 'under_renovation' %}🏗️{% endif %}
            {% if option.value == 'finishing_soon' %}⏳{% endif %}
            {% if option.value == 'ready' %}✅{% endif %}
        </span>
        <span class="tl-label">{{ option.label }}</span>
        <span class="tl-check">✓</span>
    </label>
    {% endfor %}
    {% endfor %}
</div>

<style>
.tl-widget {
    display: flex;
    gap: 10px;
    padding: 12px 0;
}
.tl-opt {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 10px 14px;
    background: #fff;
    border: 2.5px solid #e2e8f0;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    text-align: center;
}
.tl-opt:hover {
    border-color: #0D5EAF;
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(13,94,175,0.15);
}
.tl-opt.tl-active {
    border-color: #16a34a;
    background: linear-gradient(135deg, #ecfdf5, #d1fae5);
    box-shadow: 0 6px 25px rgba(22,163,74,0.25);
    transform: translateY(-2px);
}
.tl-opt input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
}
.tl-icon {
    font-size: 2.2rem;
    margin-bottom: 8px;
    transition: transform 0.25s;
}
.tl-opt:hover .tl-icon { transform: scale(1.15); }
.tl-opt.tl-active .tl-icon { transform: scale(1.2); }
.tl-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: #334155;
    line-height: 1.3;
}
.tl-opt.tl-active .tl-label { color: #16a34a; }
.tl-check {
    position: absolute;
    top: 8px; right: 8px;
    width: 24px; height: 24px;
    background: #16a34a;
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: bold;
    opacity: 0;
    transform: scale(0);
    transition: all 0.25s;
}
.tl-opt.tl-active .tl-check {
    opacity: 1;
    transform: scale(1);
}
@media (max-width: 768px) {
    .tl-widget { flex-wrap: wrap; }
    .tl-opt { flex: 0 0 calc(50% - 5px); }
}
</style>

<script>
(function(){
    document.querySelectorAll('.tl-opt').forEach(function(el){
        el.addEventListener('click', function(){
            document.querySelectorAll('.tl-opt').forEach(function(o){ o.classList.remove('tl-active'); });
            this.classList.add('tl-active');
            this.querySelector('input').checked = true;
        });
    });
})();
</script>
