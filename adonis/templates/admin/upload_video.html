{% extends 'base.html' %}
{% load static %}

{% block title %}Upload Video | Admin{% endblock %}

{% block content %}
<section style="min-height:100vh;background:linear-gradient(135deg,#0a1628 0%,#0d1f3c 100%);padding:3rem 0;">
<div class="container" style="max-width:700px;">
    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:3rem;backdrop-filter:blur(20px);">
        
        <h1 style="color:#fff;font-size:1.8rem;margin-bottom:0.5rem;"><i class="fas fa-cloud-upload-alt" style="color:#c9a227;"></i> Video Upload</h1>
        <p style="color:rgba(255,255,255,0.6);margin-bottom:2rem;">Upload large video files (up to 500MB)</p>

        <!-- Target Selection -->
        <div style="margin-bottom:1.5rem;">
            <label style="color:#fff;font-weight:600;display:block;margin-bottom:0.5rem;">Target Section</label>
            <select id="uploadTarget" style="width:100%;padding:0.75rem 1rem;background:#0a1628;border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:0.95rem;outline:none;">
                <option value="partnership">Partnership Page - Video</option>
                <option value="header">Header - Hero Video</option>
                <option value="properties">Properties Page - Hero Video</option>
            </select>
        </div>

        <!-- Drop Zone -->
        <div id="dropZone" style="border:2px dashed rgba(201,162,39,0.3);border-radius:16px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:1.5rem;">
            <i class="fas fa-video" style="font-size:3rem;color:#c9a227;margin-bottom:1rem;display:block;"></i>
            <p style="color:#fff;font-size:1.1rem;margin-bottom:0.5rem;">Click or drag video file here</p>
            <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;">MP4, MOV, WebM - Max 500MB</p>
            <input type="file" id="videoFile" accept="video/*" style="display:none;">
        </div>

        <!-- File Info -->
        <div id="fileInfo" style="display:none;background:rgba(255,255,255,0.06);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem;">
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <i class="fas fa-file-video" style="color:#c9a227;font-size:1.3rem;"></i>
                <div>
                    <div id="fileName" style="color:#fff;font-weight:600;"></div>
                    <div id="fileSize" style="color:rgba(255,255,255,0.5);font-size:0.85rem;"></div>
                </div>
            </div>
        </div>

        <!-- Progress -->
        <div id="progressWrap" style="display:none;margin-bottom:1.5rem;">
            <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;">
                <span id="progressLabel" style="color:#fff;font-weight:600;font-size:0.9rem;">Uploading...</span>
                <span id="progressPct" style="color:#c9a227;font-weight:700;">0%</span>
            </div>
            <div style="background:rgba(255,255,255,0.1);border-radius:10px;height:12px;overflow:hidden;">
                <div id="progressBar" style="width:0%;height:100%;background:linear-gradient(90deg,#c9a227,#dbb84a);border-radius:10px;transition:width 0.3s;"></div>
            </div>
            <div id="uploadSpeed" style="color:rgba(255,255,255,0.5);font-size:0.8rem;margin-top:0.5rem;"></div>
        </div>

        <!-- Status -->
        <div id="statusMsg" style="display:none;padding:1rem 1.25rem;border-radius:12px;margin-bottom:1.5rem;font-weight:600;"></div>

        <!-- Upload Button -->
        <button id="uploadBtn" disabled onclick="startUpload()" style="width:100%;padding:0.9rem;background:linear-gradient(135deg,#c9a227,#dbb84a);color:#0b2948;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;opacity:0.5;">
            <i class="fas fa-upload"></i> Upload Video
        </button>

        <a href="/admin/" style="display:block;text-align:center;color:rgba(255,255,255,0.5);margin-top:1.5rem;text-decoration:none;font-size:0.9rem;">
            <i class="fas fa-arrow-left"></i> Back to Admin
        </a>
    </div>
</div>
</section>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('videoFile');
const fileInfo = document.getElementById('fileInfo');
const uploadBtn = document.getElementById('uploadBtn');
let selectedFile = null;

// Click to select
dropZone.addEventListener('click', () => fileInput.click());

// Drag & drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#c9a227'; dropZone.style.background = 'rgba(201,162,39,0.05)'; });
dropZone.addEventListener('dragleave', e => { e.preventDefault(); dropZone.style.borderColor = 'rgba(201,162,39,0.3)'; dropZone.style.background = 'transparent'; });
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.borderColor = 'rgba(201,162,39,0.3)';
    dropZone.style.background = 'transparent';
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(file) {
    selectedFile = file;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = formatSize(file.size);
    fileInfo.style.display = 'block';
    uploadBtn.disabled = false;
    uploadBtn.style.opacity = '1';
    document.getElementById('statusMsg').style.display = 'none';
}

function formatSize(bytes) {
    if (bytes >= 1e9) return (bytes / 1e9).toFixed(2) + ' GB';
    if (bytes >= 1e6) return (bytes / 1e6).toFixed(1) + ' MB';
    return (bytes / 1e3).toFixed(0) + ' KB';
}

function startUpload() {
    if (!selectedFile) return;
    const formData = new FormData();
    formData.append('video', selectedFile);
    formData.append('target', document.getElementById('uploadTarget').value);
    
    const xhr = new XMLHttpRequest();
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressPct = document.getElementById('progressPct');
    const progressLabel = document.getElementById('progressLabel');
    const uploadSpeed = document.getElementById('uploadSpeed');
    const statusMsg = document.getElementById('statusMsg');
    
    progressWrap.style.display = 'block';
    statusMsg.style.display = 'none';
    uploadBtn.disabled = true;
    uploadBtn.style.opacity = '0.5';
    
    let startTime = Date.now();
    
    xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = pct + '%';
            progressPct.textContent = pct + '%';
            progressLabel.textContent = 'Uploading... ' + formatSize(e.loaded) + ' / ' + formatSize(e.total);
            const elapsed = (Date.now() - startTime) / 1000;
            if (elapsed > 1) {
                const speed = e.loaded / elapsed;
                const remaining = (e.total - e.loaded) / speed;
                uploadSpeed.textContent = formatSize(speed) + '/s — ~' + Math.ceil(remaining) + 's remaining';
            }
        }
    });
    
    xhr.addEventListener('load', () => {
        if (xhr.status === 200) {
            const res = JSON.parse(xhr.responseText);
            progressBar.style.width = '100%';
            progressPct.textContent = '100%';
            progressLabel.textContent = 'Upload complete!';
            uploadSpeed.textContent = '';
            statusMsg.style.display = 'block';
            statusMsg.style.background = 'rgba(22,163,74,0.15)';
            statusMsg.style.border = '1px solid rgba(22,163,74,0.3)';
            statusMsg.style.color = '#4ade80';
            statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Video uploaded and saved successfully! (' + res.filename + ')';
        } else {
            statusMsg.style.display = 'block';
            statusMsg.style.background = 'rgba(220,38,38,0.15)';
            statusMsg.style.border = '1px solid rgba(220,38,38,0.3)';
            statusMsg.style.color = '#f87171';
            statusMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Upload failed: ' + xhr.statusText;
        }
        uploadBtn.disabled = false;
        uploadBtn.style.opacity = '1';
    });
    
    xhr.addEventListener('error', () => {
        statusMsg.style.display = 'block';
        statusMsg.style.background = 'rgba(220,38,38,0.15)';
        statusMsg.style.border = '1px solid rgba(220,38,38,0.3)';
        statusMsg.style.color = '#f87171';
        statusMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Connection error. Please try again.';
        uploadBtn.disabled = false;
        uploadBtn.style.opacity = '1';
    });
    
    // Get CSRF token
    const csrfToken = getCookie('csrftoken');
    xhr.open('POST', '/admin/upload-video/');
    xhr.setRequestHeader('X-CSRFToken', csrfToken);
    xhr.send(formData);
}

function getCookie(name) {
    let val = null;
    document.cookie.split(';').forEach(c => {
        c = c.trim();
        if (c.startsWith(name + '=')) val = c.substring(name.length + 1);
    });
    return val;
}
</script>
{% endblock %}
