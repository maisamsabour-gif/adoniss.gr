name: adoniss

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adoniss-web
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      ENV: production
      DB_ENGINE: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      GUNICORN_BIND: 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/live/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: adoniss-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
      - certbot_www:/var/www/certbot:rw
      - certbot_certs:/etc/letsencrypt:rw
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health/live/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  db:
    image: postgres:16-alpine
    container_name: adoniss-db
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Tehran}
      PGTZ: ${TZ:-Asia/Tehran}
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_min_duration_statement=500
      -c log_statement=none
      -c log_timezone=Asia/Tehran
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: adoniss-redis
    restart: unless-stopped
    command: redis-server --save 60 1000 --appendonly yes --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - backend

  backup:
    image: postgres:16-alpine
    container_name: adoniss-pg-backup
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      TZ: ${TZ:-Asia/Tehran}
    volumes:
      - postgres_backups:/backups
      - ./deploy/backup:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/backup-cron.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  static_data:
  media_data:
  app_logs:
  nginx_logs:
  certbot_www:
  certbot_certs:
