<!DOCTYPE html>
{% load i18n static %}
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ورود | پنل فارسی آدونیس</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -30%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(30, 58, 95, 0.4) 0%, transparent 60%);
            pointer-events: none;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #c9a227 0%, #e8d48a 50%, #c9a227 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(201, 162, 39, 0.3);
        }

        .login-logo-icon span {
            font-size: 40px;
            color: #0f172a;
        }

        .login-title {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin: 0 0 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        .login-form {
            margin-top: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #c9a227;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.15);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 4px;
            display: flex;
        }

        .password-toggle:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .login-btn {
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            background: linear-gradient(135deg, #c9a227 0%, #e8d48a 50%, #c9a227 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 12px;
            color: #0f172a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-top: 28px;
            box-shadow: 0 4px 20px rgba(201, 162, 39, 0.3);
        }

        .login-btn:hover {
            background-position: 100% 100%;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201, 162, 39, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            padding: 12px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
            color: #fca5a5;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 32px 24px;
                margin: 16px;
            }
            
            .login-title {
                font-size: 24px;
            }
            
            .login-logo-icon {
                width: 64px;
                height: 64px;
            }
            
            .login-logo-icon span {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-icon">
                <span class="material-symbols-outlined">apartment</span>
            </div>
            <h1 class="login-title">پنل فارسی آدونیس</h1>
            <p class="login-subtitle">برای ادامه وارد حساب کاربری خود شوید</p>
        </div>

        {% if form.errors %}
            <div class="error-message">
                <span class="material-symbols-outlined">error</span>
                <span>نام کاربری یا رمز عبور اشتباه است</span>
            </div>
        {% endif %}

        <form action="{{ app_path }}" method="post" class="login-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="id_username">نام کاربری *</label>
                <input type="text" 
                       name="username" 
                       id="id_username" 
                       class="form-input" 
                       placeholder="نام کاربری"
                       autocomplete="username"
                       autofocus
                       required>
            </div>

            <div class="form-group">
                <label class="form-label" for="id_password">رمز عبور *</label>
                <div class="password-wrapper">
                    <input type="password" 
                           name="password" 
                           id="id_password" 
                           class="form-input" 
                           placeholder="رمز عبور"
                           autocomplete="current-password"
                           required>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <span class="material-symbols-outlined" id="password-icon">visibility</span>
                    </button>
                </div>
            </div>

            <input type="hidden" name="next" value="{{ next }}">

            <button type="submit" class="login-btn">
                <span>ورود به پنل</span>
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
        </form>

        <a href="/" class="back-link">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span>بازگشت به سایت</span>
        </a>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('id_password');
            const icon = document.getElementById('password-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body>
</html>
